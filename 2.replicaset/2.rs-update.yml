apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-rollback
spec:
  replicas: 3 # 컨테이너가 3개 만들어진다는 의미
  selector:
    matchLabels:
      app: nginx-app
  template: # pod 설정하는 부분
    metadata:
      labels:
        app: nginx-app
        version: v1
    spec:
      containers:
        - name: nginx-con
          image: nginx:1.25.4 # nginx:latest
          resources:
            limits:
              memory: "100Mi"
              cpu: "500m"    
